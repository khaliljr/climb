<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ClimbFit</title>
<meta name="description" content="Climbing, calisthenics, and nutrition tracker">
<meta name="theme-color" content="#171916">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClimbFit">
<link rel="icon" href="icon-192.png">
<style>
  html, body { margin:0; padding:0; background:#171916; }
</style>
</head>
<body>
<div id="app-root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root {
    --stone-900: #171916;
    --stone-800: #212420;
    --stone-700: #2c2f2a;
    --stone-600: #3c4038;
    --chalk-100: #f2efe6;
    --chalk-300: #cdc9bc;
    --chalk-500: #93907f;
    --hold-teal: #5a9b96;
    --hold-teal-dim: #3d6864;
    --hold-gold: #dba43f;
    --hold-rust: #c05a41;
    --hold-plum: #8b6a9b;
  }

  #app-root * { box-sizing: border-box; }
  #app-root {
    background: var(--stone-900);
    color: var(--chalk-100);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
    max-width: 720px;
    margin: 0 auto;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--hold-teal); margin: 0 0 4px;
  }
  h1 { font-family: 'Archivo Black', sans-serif; font-size: 28px; margin: 0 0 16px; letter-spacing: -0.01em; }

  .tabbar { display: flex; gap: 6px; margin-bottom: 20px; background: var(--stone-800); padding: 5px; border-radius: 10px; }
  .tabbtn {
    flex: 1; padding: 9px 6px; border-radius: 7px; border: none; background: transparent;
    color: var(--chalk-500); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
  }
  .tabbtn.active { background: var(--stone-700); color: var(--chalk-100); }

  .card { background: var(--stone-800); border: 1px solid var(--stone-700); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .card h2 {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--chalk-500); margin: 0 0 14px; font-weight: 600;
  }

  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (min-width: 480px) { .stat-grid { grid-template-columns: repeat(3, 1fr); } }
  .stat-box { background: var(--stone-700); border-radius: 10px; padding: 12px; }
  .stat-box .num { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; color: var(--hold-gold); }
  .stat-box .lbl { font-size: 11.5px; color: var(--chalk-500); margin-top: 2px; }

  .btn { background: var(--hold-teal-dim); border: 1px solid var(--hold-teal); color: var(--chalk-100); border-radius: 8px; padding: 10px 14px; font-size: 13.5px; font-weight: 600; cursor: pointer; }
  .btn.secondary { background: var(--stone-700); border-color: var(--stone-600); }
  .btn.danger { background: transparent; border-color: var(--hold-rust); color: var(--hold-rust); padding: 6px 10px; font-size: 12px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .form-grid label { font-size: 11.5px; color: var(--chalk-500); display: block; margin-bottom: 4px; }
  .form-grid input, .form-grid select, .form-grid textarea {
    background: var(--stone-700); border: 1px solid var(--stone-600); border-radius: 6px; color: var(--chalk-100);
    padding: 8px; font-size: 13px; width: 100%; font-family: 'Inter', sans-serif;
  }
  .form-grid textarea { resize: vertical; min-height: 50px; }

  .entry-row { padding: 12px 0; border-bottom: 1px solid var(--stone-700); font-size: 13.5px; }
  .entry-row:last-child { border-bottom: none; }
  .entry-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .entry-title { font-weight: 600; }
  .entry-meta { color: var(--chalk-500); font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
  .grade-pill { display: inline-block; background: var(--hold-teal-dim); color: var(--chalk-100); border-radius: 6px; padding: 2px 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; margin-right: 6px; }
  .grade-pill.sent { background: var(--hold-teal-dim); }
  .grade-pill.fail { background: var(--stone-600); color: var(--chalk-300); }

  .exercise-block { background: var(--stone-700); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .exercise-block .form-grid { grid-template-columns: repeat(4, 1fr); margin-bottom: 6px; }
  .exercise-block select { grid-column: 1 / -1; margin-bottom: 6px; }
  .rm-ex { background: none; border: none; color: var(--hold-rust); font-size: 12px; cursor: pointer; float: right; }

  .empty { color: var(--chalk-500); font-size: 13px; padding: 10px 0; font-style: italic; }
  .footnote { color: var(--chalk-500); font-size: 11px; text-align: center; margin-top: 24px; line-height: 1.6; }
</style>

<script>
(function() {
  // Standalone storage shim: mirrors Claude's window.storage API using
  // the browser's own localStorage, so nothing else in this file needs to change.
  if (!window.storage) {
    window.storage = {
      async get(key) {
        const v = localStorage.getItem(key);
        return v === null ? null : { key, value: v, shared: false };
      },
      async set(key, value) {
        localStorage.setItem(key, value);
        return { key, value, shared: false };
      },
      async delete(key) {
        localStorage.removeItem(key);
        return { key, deleted: true, shared: false };
      },
      async list(prefix) {
        const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
        return { keys, prefix, shared: false };
      }
    };
  }

  const GYM_EXERCISES = [
    'Barbell Squat', 'Deadlift', 'Bench Press', 'Overhead Press', 'Barbell Row',
    'Front Squat', 'Romanian Deadlift', 'Incline Bench Press', 'Leg Press', 'Lat Pulldown',
    'Seated Cable Row', 'Leg Curl', 'Leg Extension', 'Dumbbell Bench Press', 'Dumbbell Shoulder Press',
    'Dumbbell Row', 'Bulgarian Split Squat', 'Hip Thrust', 'Cable Fly', 'Lateral Raise',
    'Bicep Curl', 'Tricep Pushdown', 'Face Pull', 'Calf Raise', 'Hack Squat',
    'Chest Press Machine', 'Shoulder Press Machine', 'Smith Machine Squat', 'Other'
  ];

  const CALISTHENICS_EXERCISES = [
    'Pull-ups', 'Weighted Pull-ups', 'Chin-ups', 'Push-ups', 'Dips', 'Handstand Push-ups',
    'Muscle-ups', 'Front Lever', 'Back Lever', 'Planche', 'L-Sit', 'Squats',
    'Bulgarian Split Squats', 'Core Work'
  ];
  const WALL_ANGLES = ['Slab', 'Vertical', 'Overhang', 'Roof'];
  const HOLD_TYPES = ['Jugs', 'Crimps', 'Slopers', 'Pinches', 'Pockets'];
  const STYLES = ['Power', 'Technical', 'Endurance', 'Dyno'];
  const MEAL_TYPES = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];
  const DAY_TARGETS = {
    training: { kcal: 1550, protein: 145, carbs: 130, fat: 50, fiber: 30, label: 'Training Day' },
    rest:     { kcal: 1450, protein: 140, carbs: 100, fat: 50, fiber: 30, label: 'Rest Day' }
  };
  const WATER_TARGET = 3;
  const WATER_STEP = 0.25;

  let state = { tab: 'dashboard', climbs: [], workouts: [], gymWorkouts: [], meals: [], recipes: [], water: {}, dayTypes: {}, favorites: [], bodylogs: [], achievements: {}, profile: {}, loaded: false };
  let chartInstances = {};
  let progressRange = 30;
  let progressExercise = CALISTHENICS_EXERCISES[0];
  let calendarMonth = new Date().getMonth();
  let calendarYear = new Date().getFullYear();
  let selectedCalDate = null;

  async function loadAll() {
    try {
      const c = await window.storage.get('climbfit:climbs');
      state.climbs = c && c.value ? JSON.parse(c.value) : [];
    } catch (e) { state.climbs = []; }
    try {
      const w = await window.storage.get('climbfit:workouts');
      state.workouts = w && w.value ? JSON.parse(w.value) : [];
    } catch (e) { state.workouts = []; }
    try {
      const m = await window.storage.get('climbfit:meals');
      state.meals = m && m.value ? JSON.parse(m.value) : [];
    } catch (e) { state.meals = []; }
    try {
      const r = await window.storage.get('climbfit:recipes');
      state.recipes = r && r.value ? JSON.parse(r.value) : [];
    } catch (e) { state.recipes = []; }
    try {
      const wt = await window.storage.get('climbfit:water');
      state.water = wt && wt.value ? JSON.parse(wt.value) : {};
    } catch (e) { state.water = {}; }
    try {
      const dt = await window.storage.get('climbfit:daytypes');
      state.dayTypes = dt && dt.value ? JSON.parse(dt.value) : {};
    } catch (e) { state.dayTypes = {}; }
    try {
      const f = await window.storage.get('climbfit:favorites');
      state.favorites = f && f.value ? JSON.parse(f.value) : [];
    } catch (e) { state.favorites = []; }
    try {
      const b = await window.storage.get('climbfit:bodylogs');
      state.bodylogs = b && b.value ? JSON.parse(b.value) : [];
    } catch (e) { state.bodylogs = []; }
    try {
      const gw = await window.storage.get('climbfit:gymworkouts');
      state.gymWorkouts = gw && gw.value ? JSON.parse(gw.value) : [];
    } catch (e) { state.gymWorkouts = []; }
    try {
      const a = await window.storage.get('climbfit:achievements');
      state.achievements = a && a.value ? JSON.parse(a.value) : {};
    } catch (e) { state.achievements = {}; }
    try {
      const p = await window.storage.get('climbfit:profile');
      state.profile = p && p.value ? JSON.parse(p.value) : { name: '', height: '', experience: 'Intermediate', style: 'Bouldering', favExercises: '', units: 'kg' };
    } catch (e) { state.profile = { name: '', height: '', experience: 'Intermediate', style: 'Bouldering', favExercises: '', units: 'kg' }; }
    state.loaded = true;
    render();
  }

  async function saveClimbs() {
    try { await window.storage.set('climbfit:climbs', JSON.stringify(state.climbs)); } catch (e) { console.error(e); }
  }
  async function saveWorkouts() {
    try { await window.storage.set('climbfit:workouts', JSON.stringify(state.workouts)); } catch (e) { console.error(e); }
  }
  async function saveMeals() {
    try { await window.storage.set('climbfit:meals', JSON.stringify(state.meals)); } catch (e) { console.error(e); }
  }
  async function saveRecipes() {
    try { await window.storage.set('climbfit:recipes', JSON.stringify(state.recipes)); } catch (e) { console.error(e); }
  }
  async function saveWater() {
    try { await window.storage.set('climbfit:water', JSON.stringify(state.water)); } catch (e) { console.error(e); }
  }
  async function saveDayTypes() {
    try { await window.storage.set('climbfit:daytypes', JSON.stringify(state.dayTypes)); } catch (e) { console.error(e); }
  }
  async function saveFavorites() {
    try { await window.storage.set('climbfit:favorites', JSON.stringify(state.favorites)); } catch (e) { console.error(e); }
  }
  async function saveBodylogs() {
    try { await window.storage.set('climbfit:bodylogs', JSON.stringify(state.bodylogs)); } catch (e) { console.error(e); }
  }
  async function saveGymWorkouts() {
    try { await window.storage.set('climbfit:gymworkouts', JSON.stringify(state.gymWorkouts)); } catch (e) { console.error(e); }
  }
  async function saveAchievements() {
    try { await window.storage.set('climbfit:achievements', JSON.stringify(state.achievements)); } catch (e) { console.error(e); }
  }
  async function saveProfile() {
    try { await window.storage.set('climbfit:profile', JSON.stringify(state.profile)); } catch (e) { console.error(e); }
  }

  function todayISO() { return new Date().toISOString().slice(0, 10); }
  function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); }
  function fmtDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  function gradeValue(g) {
    if (!g) return -1;
    const m = String(g).trim().match(/^V(\d+)/i);
    return m ? parseInt(m[1], 10) : -1;
  }

  function setTab(t) { state.tab = t; render(); }

  // ---------- DASHBOARD ----------
  function dashboardStats() {
    const weekAgo = daysAgo(7);
    const climbsThisWeek = state.climbs.filter(c => c.date >= weekAgo);
    const workoutsThisWeek = state.workouts.filter(w => w.date >= weekAgo);
    const gymThisWeek = state.gymWorkouts.filter(w => w.date >= weekAgo);
    const sessionDates = new Set(climbsThisWeek.map(c => c.date));
    let highestGrade = '—';
    let highestVal = -1;
    state.climbs.forEach(c => {
      if (c.sends && gradeValue(c.grade) > highestVal) { highestVal = gradeValue(c.grade); highestGrade = c.grade; }
    });
    const totalAttempts = state.climbs.reduce((a, c) => a + (Number(c.attempts) || 0), 0);
    const totalSends = state.climbs.filter(c => c.sends).length;
    const successRate = totalAttempts > 0 ? Math.round((totalSends / state.climbs.length) * 100) : 0;
    const todayWorkout = state.workouts.find(w => w.date === todayISO());
    return {
      sessionsThisWeek: sessionDates.size,
      workoutsThisWeek: workoutsThisWeek.length,
      gymThisWeek: gymThisWeek.length,
      highestGrade, successRate, todayWorkout,
      totalClimbs: state.climbs.length
    };
  }

  function renderDashboard() {
    const s = dashboardStats();
    return `
      <div class="card">
        <h2>This week</h2>
        <div class="stat-grid">
          <div class="stat-box"><div class="num">${s.sessionsThisWeek}</div><div class="lbl">climbing sessions</div></div>
          <div class="stat-box"><div class="num">${s.workoutsThisWeek}</div><div class="lbl">calisthenics workouts</div></div>
          <div class="stat-box"><div class="num">${s.gymThisWeek}</div><div class="lbl">gym sessions</div></div>
          <div class="stat-box"><div class="num">${s.highestGrade}</div><div class="lbl">highest grade sent</div></div>
        </div>
      </div>
      <div class="card">
        <h2>All-time</h2>
        <div class="stat-grid">
          <div class="stat-box"><div class="num">${s.totalClimbs}</div><div class="lbl">total climbs logged</div></div>
          <div class="stat-box"><div class="num">${s.successRate}%</div><div class="lbl">send rate</div></div>
        </div>
      </div>
      <div class="card">
        <h2>Today</h2>
        ${s.todayWorkout
          ? `<p style="margin:0;">Logged: <strong>${s.todayWorkout.exercises.length} exercise${s.todayWorkout.exercises.length === 1 ? '' : 's'}</strong> in today's calisthenics session.</p>`
          : `<p class="empty">No calisthenics workout logged today yet.</p>`}
      </div>
    `;
  }

  // ---------- CLIMBING TRACKER ----------
  let climbForm = { date: todayISO(), location: 'Indoor', gymName: '', routeName: '', grade: '', attempts: 1, sends: true, duration: 60, wallAngle: 'Vertical', holdType: 'Jugs', style: 'Power', notes: '' };

  function renderClimbing() {
    const sorted = [...state.climbs].sort((a, b) => b.date.localeCompare(a.date));
    return `
      <div class="card">
        <h2>Log a climb</h2>
        <div class="form-grid">
          <div><label>Date</label><input type="date" id="cf-date" value="${climbForm.date}"></div>
          <div><label>Indoor / Outdoor</label>
            <select id="cf-location">
              <option ${climbForm.location === 'Indoor' ? 'selected' : ''}>Indoor</option>
              <option ${climbForm.location === 'Outdoor' ? 'selected' : ''}>Outdoor</option>
            </select>
          </div>
          <div><label>Gym / crag name</label><input type="text" id="cf-gym" value="${climbForm.gymName}" placeholder="e.g. Boulder Base Paphos"></div>
          <div><label>Route / problem name</label><input type="text" id="cf-route" value="${climbForm.routeName}" placeholder="optional"></div>
          <div><label>Grade</label><input type="text" id="cf-grade" value="${climbForm.grade}" placeholder="e.g. V4"></div>
          <div><label>Attempts</label><input type="number" id="cf-attempts" value="${climbForm.attempts}" min="1"></div>
          <div><label>Sent?</label>
            <select id="cf-sends">
              <option value="yes" ${climbForm.sends ? 'selected' : ''}>Yes</option>
              <option value="no" ${!climbForm.sends ? 'selected' : ''}>No</option>
            </select>
          </div>
          <div><label>Session duration (min)</label><input type="number" id="cf-duration" value="${climbForm.duration}"></div>
          <div><label>Wall angle</label>
            <select id="cf-angle">${WALL_ANGLES.map(a => `<option ${climbForm.wallAngle === a ? 'selected' : ''}>${a}</option>`).join('')}</select>
          </div>
          <div><label>Hold type</label>
            <select id="cf-hold">${HOLD_TYPES.map(h => `<option ${climbForm.holdType === h ? 'selected' : ''}>${h}</option>`).join('')}</select>
          </div>
          <div><label>Style</label>
            <select id="cf-style">${STYLES.map(st => `<option ${climbForm.style === st ? 'selected' : ''}>${st}</option>`).join('')}</select>
          </div>
        </div>
        <div class="form-grid full">
          <div><label>Notes</label><textarea id="cf-notes" placeholder="beta, how it felt, next time...">${climbForm.notes}</textarea></div>
        </div>
        <button class="btn" id="cf-save">Save climb</button>
      </div>

      <div class="card">
        <h2>Logged climbs</h2>
        ${sorted.length === 0 ? '<p class="empty">No climbs logged yet.</p>' :
          sorted.map(c => `
            <div class="entry-row">
              <div class="entry-top">
                <span class="entry-title"><span class="grade-pill ${c.sends ? 'sent' : 'fail'}">${c.grade || '—'}</span>${c.routeName || (c.location + ' session')}</span>
                <button class="btn danger" data-del-climb="${c.id}">Delete</button>
              </div>
              <div class="entry-meta">${fmtDate(c.date)} · ${c.gymName || c.location} · ${c.attempts} attempt${c.attempts == 1 ? '' : 's'} · ${c.wallAngle} · ${c.holdType} · ${c.style}${c.notes ? ' · ' + c.notes : ''}</div>
            </div>`).join('')}
      </div>
    `;
  }

  function readClimbForm() {
    climbForm.date = document.getElementById('cf-date').value || todayISO();
    climbForm.location = document.getElementById('cf-location').value;
    climbForm.gymName = document.getElementById('cf-gym').value;
    climbForm.routeName = document.getElementById('cf-route').value;
    climbForm.grade = document.getElementById('cf-grade').value;
    climbForm.attempts = +document.getElementById('cf-attempts').value || 1;
    climbForm.sends = document.getElementById('cf-sends').value === 'yes';
    climbForm.duration = +document.getElementById('cf-duration').value || 0;
    climbForm.wallAngle = document.getElementById('cf-angle').value;
    climbForm.holdType = document.getElementById('cf-hold').value;
    climbForm.style = document.getElementById('cf-style').value;
    climbForm.notes = document.getElementById('cf-notes').value;
  }

  function saveClimb() {
    readClimbForm();
    state.climbs.push({ ...climbForm, id: Date.now() + Math.random() });
    saveClimbs();
    climbForm = { ...climbForm, routeName: '', grade: '', notes: '' };
    render();
  }

  function deleteClimb(id) {
    state.climbs = state.climbs.filter(c => c.id !== id);
    saveClimbs(); render();
  }

  // ---------- CALISTHENICS TRACKER ----------
  let workoutForm = { date: todayISO(), exercises: [{ name: CALISTHENICS_EXERCISES[0], sets: 3, reps: 8, weight: 0, time: 0, rest: 90, rpe: 7, notes: '' }] };

  function renderCalisthenics() {
    const sorted = [...state.workouts].sort((a, b) => b.date.localeCompare(a.date));
    return `
      <div class="card">
        <h2>Log a workout</h2>
        <div class="form-grid" style="grid-template-columns: 1fr;">
          <div><label>Date</label><input type="date" id="wf-date" value="${workoutForm.date}"></div>
        </div>
        <div id="wf-exercises">
          ${workoutForm.exercises.map((ex, i) => `
            <div class="exercise-block" data-ex-index="${i}">
              <button class="rm-ex" data-rm-ex="${i}">remove</button>
              <select data-ex-field="name" data-ex-index="${i}">
                ${CALISTHENICS_EXERCISES.map(e => `<option ${ex.name === e ? 'selected' : ''}>${e}</option>`).join('')}
              </select>
              <div class="form-grid">
                <div><label>Sets</label><input type="number" data-ex-field="sets" data-ex-index="${i}" value="${ex.sets}"></div>
                <div><label>Reps</label><input type="number" data-ex-field="reps" data-ex-index="${i}" value="${ex.reps}"></div>
                <div><label>Weight (kg)</label><input type="number" data-ex-field="weight" data-ex-index="${i}" value="${ex.weight}"></div>
                <div><label>Time (sec, if applicable)</label><input type="number" data-ex-field="time" data-ex-index="${i}" value="${ex.time}"></div>
                <div><label>Rest (sec)</label><input type="number" data-ex-field="rest" data-ex-index="${i}" value="${ex.rest}"></div>
                <div><label>RPE (1-10)</label><input type="number" data-ex-field="rpe" data-ex-index="${i}" value="${ex.rpe}" min="1" max="10"></div>
              </div>
              <input type="text" data-ex-field="notes" data-ex-index="${i}" value="${ex.notes}" placeholder="notes" style="background: var(--stone-600); border: 1px solid var(--stone-600); border-radius: 6px; color: var(--chalk-100); padding: 7px; font-size: 12.5px; width: 100%;">
            </div>`).join('')}
        </div>
        <button class="btn secondary" id="wf-add-ex" style="margin-bottom: 10px;">+ Add exercise</button>
        <button class="btn" id="wf-save">Save workout</button>
      </div>

      <div class="card">
        <h2>Workout history</h2>
        ${sorted.length === 0 ? '<p class="empty">No workouts logged yet.</p>' :
          sorted.map(w => `
            <div class="entry-row">
              <div class="entry-top">
                <span class="entry-title">${fmtDate(w.date)}</span>
                <button class="btn danger" data-del-workout="${w.id}">Delete</button>

  // ---------- MEAL TRACKER ----------
  let mealForm = { mealType: 'Breakfast', name: '', kcal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, saveFav: false };
  let mealDate = todayISO();

  function mealsForDate(date) { return state.meals.filter(m => m.date === date); }

  function mealTotals(date) {
    return mealsForDate(date).reduce((a, m) => ({
      kcal: a.kcal + m.kcal, protein: a.protein + m.protein, carbs: a.carbs + m.carbs, fat: a.fat + m.fat, fiber: a.fiber + m.fiber
    }), { kcal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });
  }

  function barColor(pct) {
    if (pct >= 0.9 && pct <= 1.15) return 'var(--hold-teal)';
    if (pct > 1.15) return 'var(--hold-rust)';
    return 'var(--hold-gold)';
  }

  function macroRow(name, val, target, unit) {
    const pct = target > 0 ? val / target : 0;
    return `
      <div style="margin-bottom: 12px;">
        <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
          <span style="color: var(--chalk-300);">${name}</span>
          <span style="font-family:'IBM Plex Mono',monospace; font-weight:600;">${Math.round(val)} / ${target}${unit}</span>
        </div>
        <div style="height:9px; border-radius:5px; background: var(--stone-700); overflow:hidden;">
          <div style="height:100%; border-radius:5px; width:${Math.min(pct,1)*100}%; background:${barColor(pct)};"></div>
        </div>
      </div>`;
  }

  function renderMeals() {
    const dayType = state.dayTypes[mealDate] || 'training';
    const targets = DAY_TARGETS[dayType];
    const totals = mealTotals(mealDate);
    const waterCount = state.water[mealDate] || 0;
    const todaysMeals = mealsForDate(mealDate);

    const history = [...new Set(state.meals.map(m => m.date))].sort().reverse().slice(0, 7).map(d => {
      const t = mealTotals(d);
      return `<div class="entry-row"><div class="entry-top"><span class="entry-title">${fmtDate(d)}</span><span class="entry-meta">${Math.round(t.kcal)}kcal · ${Math.round(t.protein)}p</span></div></div>`;
    }).join('');

    return `
      <div class="card">
        <h2>Day</h2>
        <div class="form-grid" style="grid-template-columns: 1fr 1fr;">
          <div><label>Date</label><input type="date" id="mf-viewdate" value="${mealDate}"></div>
          <div><label>Day type</label>
            <select id="mf-daytype">
              <option value="training" ${dayType === 'training' ? 'selected' : ''}>Training day</option>
              <option value="rest" ${dayType === 'rest' ? 'selected' : ''}>Rest day</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Macros vs target — ${targets.label}</h2>
        ${macroRow('Calories', totals.kcal, targets.kcal, '')}
        ${macroRow('Protein', totals.protein, targets.protein, 'g')}
        ${macroRow('Carbs', totals.carbs, targets.carbs, 'g')}
        ${macroRow('Fat', totals.fat, targets.fat, 'g')}
        ${macroRow('Fiber', totals.fiber, targets.fiber, 'g')}
      </div>

      <div class="card">
        <h2>Water intake</h2>
        <div style="display:flex; align-items:center; gap:14px;">
          <button class="btn secondary" id="water-minus">−</button>
          <span style="font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:600;">${waterCount.toFixed(2).replace(/\.?0+$/, '') || '0'}L / ${WATER_TARGET}L</span>
          <button class="btn secondary" id="water-plus">+</button>
        </div>
      </div>

      ${state.favorites.length > 0 ? `
      <div class="card">
        <h2>Favorite meals — quick add</h2>

          ${state.favorites.map((f, i) => `
            <button class="preset-fav" data-fav="${i}" style="text-align:left; background: var(--stone-700); border:1px solid var(--stone-600); border-radius:8px; padding:10px; color: var(--chalk-100); cursor:pointer; font-size:12.5px;">
              ${f.name}<br><span style="color: var(--hold-gold); font-family:'IBM Plex Mono',monospace; font-size:11px;">${f.kcal}kcal · ${f.protein}p</span>
            </button>`).join('')}
        </div>
      </div>` : ''}

      <div class="card">
        <h2>Add a meal</h2>
        <div class="form-grid">
          <div><label>Meal</label>
            <select id="mf-mealtype">${MEAL_TYPES.map(m => `<option ${mealForm.mealType === m ? 'selected' : ''}>${m}</option>`).join('')}</select>
          </div>
          <div><label>Food / description</label><input type="text" id="mf-name" value="${mealForm.name}" placeholder="e.g. Chicken and rice"></div>
          <div><label>Calories</label><input type="number" id="mf-kcal" value="${mealForm.kcal}"></div>
          <div><label>Protein (g)</label><input type="number" id="mf-protein" value="${mealForm.protein}"></div>
          <div><label>Carbs (g)</label><input type="number" id="mf-carbs" value="${mealForm.carbs}"></div>
          <div><label>Fat (g)</label><input type="number" id="mf-fat" value="${mealForm.fat}"></div>
          <div><label>Fiber (g)</label><input type="number" id="mf-fiber" value="${mealForm.fiber}"></div>
        </div>
        <label style="font-size: 12.5px; color: var(--chalk-300); display:flex; align-items:center; gap:6px; margin-bottom:10px;">
          <input type="checkbox" id="mf-savefav" ${mealForm.saveFav ? 'checked' : ''} style="width:auto;"> Save as favorite for quick-add later
        </label>
        <button class="btn" id="mf-save">Add meal</button>
      </div>

      <div class="card">
        <h2>Logged — ${fmtDate(mealDate)}</h2>
        ${todaysMeals.length === 0 ? '<p class="empty">Nothing logged for this day yet.</p>' :
          MEAL_TYPES.map(mt => {
            const items = todaysMeals.filter(m => m.mealType === mt);
            if (items.length === 0) return '';
            return `<div style="margin-bottom:10px;"><div style="font-size:11.5px; color:var(--chalk-500); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px;">${mt}</div>
              ${items.map(m => `<div class="entry-row"><div class="entry-top"><span>${m.name}</span><button class="btn danger" data-del-meal="${m.id}">Delete</button></div><div class="entry-meta">${m.kcal}kcal · ${m.protein}p / ${m.carbs}c / ${m.fat}f</div></div>`).join('')}
              </div>`;
          }).join('')}
      </div>

      <div class="card">
        <h2>Last 7 days</h2>
        ${history || '<p class="empty">No meal history yet.</p>'}
      </div>
    `;
  }

  function readMealForm() {
    mealForm.mealType = document.getElementById('mf-mealtype').value;
    mealForm.name = document.getElementById('mf-name').value;
    mealForm.kcal = +document.getElementById('mf-kcal').value || 0;
    mealForm.protein = +document.getElementById('mf-protein').value || 0;
    mealForm.carbs = +document.getElementById('mf-carbs').value || 0;
    mealForm.fat = +document.getElementById('mf-fat').value || 0;

  function saveMealEntry() {
    readMealForm();
    if (!mealForm.name) return;
    state.meals.push({ ...mealForm, date: mealDate, id: Date.now() + Math.random() });
    if (mealForm.saveFav) {
      state.favorites.push({ name: mealForm.name, kcal: mealForm.kcal, protein: mealForm.protein, carbs: mealForm.carbs, fat: mealForm.fat, fiber: mealForm.fiber, mealType: mealForm.mealType });

  function readRecipeForm() {

        <h2>Weight log history</h2>
        ${sortedBody.length === 0 ? '<p class="empty">No entries yet.</p>' :
          sortedBody.map(b => `<div class="entry-row"><div class="entry-top"><span>${fmtDate(b.date)}</span><span>${b.weight}kg <button class="btn danger" data-del-body="${b.id}">Delete</button></span></div></div>`).join('')}
      </div>
    `;
  }

  function destroyCharts() {
    Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch (e) {} });
    chartInstances = {};
  }

  function chartTheme() {
    return {
      grid: 'rgba(242,239,230,0.08)',
      text: '#93907f',
    };
  }

  function initProgressCharts() {
    if (typeof Chart === 'undefined') return;
    destroyCharts();
    const theme = chartTheme();
    Chart.defaults.color = theme.text;
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size = 11;

    const cutoff = cutoffDate(progressRange);

    // Weight chart
    const weightEl = document.getElementById('chart-weight');
    if (weightEl) {
      const pts = [...state.bodylogs].filter(b => b.date >= cutoff).sort((a, b) => a.date.localeCompare(b.date));
      chartInstances.weight = new Chart(weightEl, {
        type: 'line',
        data: { labels: pts.map(p => fmtDate(p.date)), datasets: [{ label: 'Weight (kg)', data: pts.map(p => p.weight), borderColor: '#dba43f', backgroundColor: 'rgba(219,164,63,0.15)', tension: 0.25, fill: true, pointRadius: 3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: theme.grid } }, y: { grid: { color: theme.grid } } } }
      });
    }

    // Grade progression (cumulative best V-grade over time)
    const gradeEl = document.getElementById('chart-grade');
    if (gradeEl) {
      const sends = [...state.climbs].filter(c => c.sends && gradeValue(c.grade) >= 0).sort((a, b) => a.date.localeCompare(b.date));
      let best = -1;
      const pts = [];
      sends.forEach(c => { const v = gradeValue(c.grade); if (v > best) { best = v; pts.push({ date: c.date, grade: v }); } });
      chartInstances.grade = new Chart(gradeEl, {
        type: 'line',
        data: { labels: pts.map(p => fmtDate(p.date)), datasets: [{ label: 'Highest grade', data: pts.map(p => p.grade), borderColor: '#5a9b96', backgroundColor: 'rgba(90,155,150,0.15)', stepped: true, fill: true, pointRadius: 3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => 'V' + ctx.parsed.y } } }, scales: { x: { grid: { color: theme.grid } }, y: { grid: { color: theme.grid }, ticks: { callback: (v) => 'V' + v } } } }
      });
    }

    // Nutrition chart (calories + protein per day)
    const nutriEl = document.getElementById('chart-nutrition');
    if (nutriEl) {
      const dates = [...new Set(state.meals.filter(m => m.date >= cutoff).map(m => m.date))].sort();
      const kcalData = dates.map(d => mealTotals(d).kcal);
      const proteinData = dates.map(d => mealTotals(d).protein);
      chartInstances.nutrition = new Chart(nutriEl, {
        type: 'line',
        data: {
          labels: dates.map(fmtDate),
          datasets: [
            { label: 'Calories', data: kcalData, borderColor: '#dba43f', yAxisID: 'y', tension: 0.25, pointRadius: 2 },
            { label: 'Protein (g)', data: proteinData, borderColor: '#5a9b96', yAxisID: 'y1', tension: 0.25, pointRadius: 2 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: true, labels: { boxWidth: 10 } } },
          scales: {
            x: { grid: { color: theme.grid } },
            y: { position: 'left', grid: { color: theme.grid } },
            y1: { position: 'right', grid: { display: false } }
          }
        }
      });
    }

    // Weekly frequency chart (last 8 weeks)
    const freqEl = document.getElementById('chart-frequency');
    if (freqEl) {
      const weeks = [];
      for (let i = 7; i >= 0; i--) {
        const start = daysAgo(i * 7 + 6);
        const end = daysAgo(i * 7);
        weeks.push({ label: fmtDate(start), start, end });
      }
      const climbCounts = weeks.map(w => new Set(state.climbs.filter(c => c.date >= w.start && c.date <= w.end).map(c => c.date)).size);
      const workoutCounts = weeks.map(w => state.workouts.filter(wk => wk.date >= w.start && wk.date <= w.end).length);
      chartInstances.frequency = new Chart(freqEl, {
        type: 'bar',
        data: {
          labels: weeks.map(w => w.label),
          datasets: [
            { label: 'Climbing sessions', data: climbCounts, backgroundColor: '#5a9b96' },
            { label: 'Calisthenics workouts', data: workoutCounts, backgroundColor: '#dba43f' }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, labels: { boxWidth: 10 } } }, scales: { x: { grid: { color: theme.grid } }, y: { grid: { color: theme.grid }, ticks: { stepSize: 1 } } } }
      });
    }

    // Exercise progression (max reps per session over time for selected exercise)
    const exEl = document.getElementById('chart-exercise');
    if (exEl) {
      const pts = [];
      [...state.workouts].sort((a, b) => a.date.localeCompare(b.date)).forEach(w => {
        const matches = w.exercises.filter(e => e.name === progressExercise);
        if (matches.length > 0) {
          const maxReps = Math.max(...matches.map(e => e.reps || 0));
          pts.push({ date: w.date, reps: maxReps });
        }
      });
      chartInstances.exercise = new Chart(exEl, {
        type: 'line',
        data: { labels: pts.map(p => fmtDate(p.date)), datasets: [{ label: progressExercise + ' (max reps)', data: pts.map(p => p.reps), borderColor: '#8b6a9b', backgroundColor: 'rgba(139,106,155,0.15)', tension: 0.25, fill: true, pointRadius: 3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: theme.grid } }, y: { grid: { color: theme.grid } } } }
      });
      if (pts.length === 0) { exEl.parentElement.insertAdjacentHTML('beforeend', '<p class="empty">No sessions logged for this exercise yet.</p>'); }
    }
  }

  // ---------- ACHIEVEMENTS ----------
  const ACHIEVEMENT_DEFS = [
    { key: 'first_climb', label: 'First Climb', desc: 'Log your first climbing session', check: () => state.climbs.length > 0 },
    { key: 'first_v4', label: 'First V4', desc: 'Send your first V4', check: () => state.climbs.some(c => c.sends && gradeValue(c.grade) >= 4) },
    { key: 'hundred_pullups', label: '100 Pull-ups', desc: 'Accumulate 100 total pull-up reps across all sessions', check: () => {
      let total = 0;
      state.workouts.forEach(w => w.exercises.forEach(e => { if (e.name === 'Pull-ups' || e.name === 'Weighted Pull-ups') total += (e.sets || 0) * (e.reps || 0); }));
      return total >= 100;
    }},
    { key: 'thirty_day_streak', label: '30-Day Streak', desc: 'Log a climb or workout 30 days in a row', check: () => {
      const dates = new Set([...state.climbs.map(c => c.date), ...state.workouts.map(w => w.date), ...state.gymWorkouts.map(w => w.date)]);
      let streak = 0, best = 0;
      for (let i = 0; i < 400; i++) {
        const d = daysAgo(i);
        if (dates.has(d)) { streak++; best = Math.max(best, streak); } else { streak = 0; }
      }
      return best >= 30;
    }},
    { key: 'hundred_sessions', label: '100 Sessions', desc: 'Log 100 total climbing sessions + workouts combined', check: () => (state.climbs.length + state.workouts.length + state.gymWorkouts.length) >= 100 },
    { key: 'ten_perfect_days', label: '10 Perfect Nutrition Days', desc: 'Hit your calorie and protein targets 10 different days', check: () => {
      const dates = [...new Set(state.meals.map(m => m.date))];
      let count = 0;
      dates.forEach(d => {
        const t = mealTotals(d);
        const dt = DAY_TARGETS[state.dayTypes[d] || 'training'];
        if (t.kcal >= dt.kcal * 0.9 && t.kcal <= dt.kcal * 1.15 && t.protein >= dt.protein) count++;
      });
      return count >= 10;
    }},
  ];

  function checkAchievements() {
    let changed = false;
    ACHIEVEMENT_DEFS.forEach(def => {
      if (!state.achievements[def.key] && def.check()) {
        state.achievements[def.key] = todayISO();
        changed = true;
      }
    });
    if (changed) saveAchievements();
  }

  function renderAchievements() {
    return `
      <div class="card">
        <h2>Badges</h2>
        <div class="stat-grid">
          ${ACHIEVEMENT_DEFS.map(def => {
            const unlocked = state.achievements[def.key];
            return `
              <div class="stat-box" style="${unlocked ? 'border: 1px solid var(--hold-gold);' : 'opacity: 0.5;'}">
                <div style="font-size: 22px; margin-bottom: 4px;">${unlocked ? '🏅' : '🔒'}</div>
                <div style="font-weight: 600; font-size: 13px;">${def.label}</div>
                <div class="lbl" style="margin-top: 4px;">${def.desc}</div>
                ${unlocked ? `<div style="font-size:10.5px; color: var(--hold-gold); margin-top:4px; font-family:'IBM Plex Mono',monospace;">Unlocked ${fmtDate(unlocked)}</div>` : ''}
              </div>`;
          }).join('')}
        </div>
      </div>
    `;
  }

  // ---------- CALENDAR ----------
  function changeMonth(delta) {
    calendarMonth += delta;
    if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
    if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
    render();
  }

  function renderCalendar() {
    const first = new Date(calendarYear, calendarMonth, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
    const monthLabel = first.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

    let cells = '';
    for (let i = 0; i < startDow; i++) cells += `<div></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const hasClimb = state.climbs.some(c => c.date === iso);
      const hasWorkout = state.workouts.some(w => w.date === iso);
      const hasGym = state.gymWorkouts.some(w => w.date === iso);
      const hasMeal = state.meals.some(m => m.date === iso);
      const isSelected = selectedCalDate === iso;
      cells += `
        <div data-caldate="${iso}" style="cursor:pointer; padding:6px 2px; border-radius:6px; text-align:center; font-size:12px; ${isSelected ? 'background: var(--hold-teal-dim); border: 1px solid var(--hold-teal);' : 'background: var(--stone-700);'}">
          <div>${d}</div>
          <div style="display:flex; gap:2px; justify-content:center; margin-top:3px;">
            ${hasClimb ? '<span style="width:5px;height:5px;border-radius:50%;background:var(--hold-teal);display:inline-block;"></span>' : ''}
            ${hasWorkout ? '<span style="width:5px;height:5px;border-radius:50%;background:var(--hold-gold);display:inline-block;"></span>' : ''}
            ${hasGym ? '<span style="width:5px;height:5px;border-radius:50%;background:var(--hold-plum);display:inline-block;"></span>' : ''}
            ${hasMeal ? '<span style="width:5px;height:5px;border-radius:50%;background:var(--chalk-500);display:inline-block;"></span>' : ''}
          </div>
        </div>`;
    }

    const selDetails = selectedCalDate ? `
      <div class="card">
        <h2>${fmtDate(selectedCalDate)}</h2>
        ${state.climbs.filter(c => c.date === selectedCalDate).map(c => `<div class="entry-row"><span class="grade-pill ${c.sends ? 'sent' : 'fail'}">${c.grade || '—'}</span>${c.routeName || c.location} climb</div>`).join('')}
        ${state.workouts.filter(w => w.date === selectedCalDate).map(w => `<div class="entry-row">Calisthenics: ${w.exercises.map(e => e.name).join(', ')}</div>`).join('')}
        ${state.gymWorkouts.filter(w => w.date === selectedCalDate).map(w => `<div class="entry-row">Gym: ${w.exercises.map(e => e.name).join(', ')}</div>`).join('')}
        ${state.meals.filter(m => m.date === selectedCalDate).map(m => `<div class="entry-row">${m.mealType}: ${m.name} (${m.kcal}kcal)</div>`).join('')}
        ${(!state.climbs.some(c => c.date === selectedCalDate) && !state.workouts.some(w => w.date === selectedCalDate) && !state.gymWorkouts.some(w => w.date === selectedCalDate) && !state.meals.some(m => m.date === selectedCalDate)) ? '<p class="empty">Nothing logged this day.</p>' : ''}
      </div>` : '';

    return `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 14px;">
          <button class="btn secondary" id="cal-prev">‹</button>
          <h2 style="margin:0; text-transform:none; font-size:15px; font-family:'Inter',sans-serif; color: var(--chalk-100);">${monthLabel}</h2>
          <button class="btn secondary" id="cal-next">›</button>
        </div>
        <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap: 4px; font-size:10.5px; color: var(--chalk-500); text-align:center; margin-bottom:4px;">
          <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
        </div>
        <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">
          ${cells}
        </div>
        <div style="display:flex; gap:14px; margin-top: 12px; font-size:11.5px; color: var(--chalk-500);">
          <span><span style="width:7px;height:7px;border-radius:50%;background:var(--hold-teal);display:inline-block; margin-right:4px;"></span>Climb</span>
          <span><span style="width:7px;height:7px;border-radius:50%;background:var(--hold-gold);display:inline-block; margin-right:4px;"></span>Workout</span>
          <span><span style="width:7px;height:7px;border-radius:50%;background:var(--hold-plum);display:inline-block; margin-right:4px;"></span>Meal</span>
        </div>
      </div>
      ${selDetails}
    `;
  }

  // ---------- PROFILE / SETTINGS ----------
  function renderProfile() {
    const p = state.profile;
    return `
      <div class="card">
        <h2>Your profile</h2>
        <div class="form-grid">
          <div><label>Name</label><input type="text" id="pr-name" value="${p.name || ''}"></div>
          <div><label>Height (cm)</label><input type="number" id="pr-height" value="${p.height || ''}"></div>
          <div><label>Experience level</label>
            <select id="pr-experience">
              ${['Beginner', 'Intermediate', 'Advanced'].map(e => `<option ${p.experience === e ? 'selected' : ''}>${e}</option>`).join('')}
            </select>
          </div>
          <div><label>Preferred climbing style</label>
            <select id="pr-style">
              ${['Bouldering', 'Sport', 'Trad', 'Top rope'].map(e => `<option ${p.style === e ? 'selected' : ''}>${e}</option>`).join('')}
            </select>
          </div>
          <div><label>Weight units</label>
            <select id="pr-units">
              <option value="kg" ${p.units === 'kg' ? 'selected' : ''}>kg</option>
              <option value="lb" ${p.units === 'lb' ? 'selected' : ''}>lb</option>
            </select>
          </div>
        </div>
        <div class="form-grid full">
          <div><label>Favorite exercises</label><input type="text" id="pr-favex" value="${p.favExercises || ''}" placeholder="e.g. Front Lever, Muscle-ups"></div>
        </div>
        <button class="btn" id="pr-save">Save profile</button>
      </div>

      <div class="card">
        <h2>Your data</h2>
        <p style="font-size: 13px; color: var(--chalk-300); margin-top:0;">Everything is stored only in this browser/artifact. Back it up regularly so you don't lose it.</p>
        <button class="btn secondary" id="pr-export">Export all data (.json)</button>
        <div style="margin-top: 10px;">
          <label style="font-size:11.5px; color: var(--chalk-500); display:block; margin-bottom:4px;">Import backup</label>
          <input type="file" id="pr-import" accept="application/json">
        </div>
      </div>
    `;
  }

  function saveProfileForm() {
    state.profile = {
      ...state.profile,
      name: document.getElementById('pr-name').value,
      height: document.getElementById('pr-height').value,
      experience: document.getElementById('pr-experience').value,
      style: document.getElementById('pr-style').value,
      units: document.getElementById('pr-units').value,
      favExercises: document.getElementById('pr-favex').value,
    };
    saveProfile(); render();
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'climbfit-backup-' + todayISO() + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        state = { ...state, ...parsed, loaded: true };
        await Promise.all([saveClimbs(), saveWorkouts(), saveGymWorkouts(), saveMeals(), saveRecipes(), saveWater(), saveDayTypes(), saveFavorites(), saveBodylogs(), saveAchievements(), saveProfile()]);
        render();
      } catch (err) { alert('Could not read that file — make sure it is a ClimbFit export.'); }
    };
    reader.readAsText(file);
  }

  // ---------- MAIN RENDER ----------
  function render() {
    const root = document.getElementById('app-root');
    if (!state.loaded) { root.innerHTML = '<p class="empty">Loading ClimbFit...</p>'; return; }

    let body = '';
    if (state.tab === 'dashboard') body = renderDashboard();
    else if (state.tab === 'climbing') body = renderClimbing();
    else if (state.tab === 'calisthenics') body = renderCalisthenics();
    else if (state.tab === 'gym') body = renderGym();
    else if (state.tab === 'meals') body = renderMeals();
    else if (state.tab === 'recipes') body = renderRecipes();
    else if (state.tab === 'progress') body = renderProgress();
    else if (state.tab === 'achievements') body = renderAchievements();
    else if (state.tab === 'calendar') body = renderCalendar();
    else if (state.tab === 'profile') body = renderProfile();

    checkAchievements();

    root.innerHTML = `
      <p class="eyebrow">ClimbFit</p>
      <h1>Dashboard</h1>
      <div class="tabbar">
        <button class="tabbtn ${state.tab === 'dashboard' ? 'active' : ''}" data-tab="dashboard">Dashboard</button>
        <button class="tabbtn ${state.tab === 'climbing' ? 'active' : ''}" data-tab="climbing">Climbing</button>
        <button class="tabbtn ${state.tab === 'calisthenics' ? 'active' : ''}" data-tab="calisthenics">Calisthenics</button>
      </div>
      <div class="tabbar">
        <button class="tabbtn ${state.tab === 'gym' ? 'active' : ''}" data-tab="gym">Gym</button>
        <button class="tabbtn ${state.tab === 'meals' ? 'active' : ''}" data-tab="meals">Meals</button>
        <button class="tabbtn ${state.tab === 'recipes' ? 'active' : ''}" data-tab="recipes">Recipes</button>
      </div>
      <div class="tabbar">
        <button class="tabbtn ${state.tab === 'progress' ? 'active' : ''}" data-tab="progress">Progress</button>
        <button class="tabbtn ${state.tab === 'achievements' ? 'active' : ''}" data-tab="achievements">Achievements</button>
        <button class="tabbtn ${state.tab === 'calendar' ? 'active' : ''}" data-tab="calendar">Calendar</button>
      </div>
      <div class="tabbar">
        <button class="tabbtn ${state.tab === 'profile' ? 'active' : ''}" data-tab="profile">Profile</button>
      </div>
      ${body}
      <p class="footnote">ClimbFit — all core features are live: dashboard, climbing, calisthenics, gym, meals, recipes, progress charts, achievements, calendar, and profile.</p>
    `;

    root.querySelectorAll('[data-tab]').forEach(el => el.onclick = () => setTab(el.dataset.tab));
    const climbSave = document.getElementById('cf-save');
    if (climbSave) climbSave.onclick = saveClimb;
    root.querySelectorAll('[data-del-climb]').forEach(el => el.onclick = () => deleteClimb(+el.dataset.delClimb));
    const wfAdd = document.getElementById('wf-add-ex');
    if (wfAdd) wfAdd.onclick = addExercise;
    root.querySelectorAll('[data-rm-ex]').forEach(el => el.onclick = () => removeExercise(+el.dataset.rmEx));
    const wfSave = document.getElementById('wf-save');
    if (wfSave) wfSave.onclick = saveWorkout;
    root.querySelectorAll('[data-del-workout]').forEach(el => el.onclick = () => deleteWorkout(+el.dataset.delWorkout));
    const gyAdd = document.getElementById('gy-add-ex');
    if (gyAdd) gyAdd.onclick = addGymExercise;
    root.querySelectorAll('[data-rm-gyex]').forEach(el => el.onclick = () => removeGymExercise(+el.dataset.rmGyex));
    const gySave = document.getElementById('gy-save');
    if (gySave) gySave.onclick = saveGymSession;
    root.querySelectorAll('[data-del-gym]').forEach(el => el.onclick = () => deleteGymSession(+el.dataset.delGym));

    const mfViewdate = document.getElementById('mf-viewdate');
    if (mfViewdate) mfViewdate.onchange = () => { mealDate = mfViewdate.value || todayISO(); render(); };
    const mfDaytype = document.getElementById('mf-daytype');
    if (mfDaytype) mfDaytype.onchange = () => { state.dayTypes[mealDate] = mfDaytype.value; saveDayTypes(); render(); };
    const waterMinus = document.getElementById('water-minus');
    if (waterMinus) waterMinus.onclick = () => adjustWater(-WATER_STEP);
    const waterPlus = document.getElementById('water-plus');
    if (waterPlus) waterPlus.onclick = () => adjustWater(WATER_STEP);
    root.querySelectorAll('[data-fav]').forEach(el => el.onclick = () => addFavoriteToLog(+el.dataset.fav));
    const mfSave = document.getElementById('mf-save');
    if (mfSave) mfSave.onclick = saveMealEntry;
    root.querySelectorAll('[data-del-meal]').forEach(el => el.onclick = () => deleteMeal(+el.dataset.delMeal));

    const rfSearch = document.getElementById('rf-search');
    if (rfSearch) rfSearch.oninput = () => { recipeSearch = rfSearch.value; render(); };
    const rfSave = document.getElementById('rf-save');
    if (rfSave) rfSave.onclick = saveRecipe;
    const rfCancel = document.getElementById('rf-cancel');
    if (rfCancel) rfCancel.onclick = cancelEditRecipe;
    root.querySelectorAll('[data-log-recipe]').forEach(el => el.onclick = () => logRecipeAsMeal(+el.dataset.logRecipe));
    root.querySelectorAll('[data-dup-recipe]').forEach(el => el.onclick = () => duplicateRecipe(+el.dataset.dupRecipe));
    root.querySelectorAll('[data-edit-recipe]').forEach(el => el.onclick = () => editRecipe(+el.dataset.editRecipe));
    root.querySelectorAll('[data-del-recipe]').forEach(el => el.onclick = () => deleteRecipe(+el.dataset.delRecipe));

    root.querySelectorAll('[data-range]').forEach(el => el.onclick = () => { progressRange = +el.dataset.range; render(); });
    const bfSave = document.getElementById('bf-save');
    if (bfSave) bfSave.onclick = saveBodyLog;
    root.querySelectorAll('[data-del-body]').forEach(el => el.onclick = () => deleteBodyLog(+el.dataset.delBody));
    const pfExercise = document.getElementById('pf-exercise');
    if (pfExercise) pfExercise.onchange = () => { progressExercise = pfExercise.value; initProgressCharts(); };

    const calPrev = document.getElementById('cal-prev');
    if (calPrev) calPrev.onclick = () => changeMonth(-1);
    const calNext = document.getElementById('cal-next');
    if (calNext) calNext.onclick = () => changeMonth(1);
    root.querySelectorAll('[data-caldate]').forEach(el => el.onclick = () => { selectedCalDate = el.dataset.caldate; render(); });

    const prSave = document.getElementById('pr-save');
    if (prSave) prSave.onclick = saveProfileForm;
    const prExport = document.getElementById('pr-export');
    if (prExport) prExport.onclick = exportData;
    const prImport = document.getElementById('pr-import');
    if (prImport) prImport.onchange = () => { if (prImport.files[0]) importData(prImport.files[0]); };

    if (state.tab === 'progress') {
      setTimeout(initProgressCharts, 0);
    } else {
      destroyCharts();
    }
  }

  loadAll();
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
